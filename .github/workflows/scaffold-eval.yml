name: Scaffold Evaluation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  scaffold-matrix:
    name: scaffold evaluation matrix
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.scaffold-matrix.outputs.presets }}
      include_axum: ${{ steps.scaffold-matrix.outputs.include_axum }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: scaffold-matrix
        run: node ./scripts/scaffold-ci-matrix.mjs

  scaffold:
    name: scaffold / ${{ matrix.preset.name }}
    needs: scaffold-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJSON(needs.scaffold-matrix.outputs.presets) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.preset.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.preset.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.preset.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: >
          node ./scripts/scaffold-eval.mjs
          --preset "${{ matrix.preset.name }}"
          --target-root "${{ runner.temp }}/scaffold-eval"
