name: Scaffold Fixture CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/templates-ci.yml'
      - 'bin/**'
      - 'package.json'
      - 'scripts/**'
      - 'templates/modules/**'
      - 'scaffolds/presets/**'
      - 'scaffolds/generated/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/templates-ci.yml'
      - 'bin/**'
      - 'package.json'
      - 'scripts/**'
      - 'templates/modules/**'
      - 'scaffolds/presets/**'
      - 'scaffolds/generated/**'
  workflow_dispatch:

concurrency:
  group: scaffold-fixtures-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: ${{ matrix.fixture.name }} / fast
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - name: next-monorepo
            path: scaffolds/generated/next-monorepo
            needs_python: false
            needs_rust: false
          - name: next-fastapi-monorepo
            path: scaffolds/generated/next-fastapi-monorepo
            needs_python: true
            needs_rust: false
          - name: next-axum-monorepo
            path: scaffolds/generated/next-axum-monorepo
            needs_python: false
            needs_rust: true
          - name: next-fastapi-axum-monorepo
            path: scaffolds/generated/next-fastapi-axum-monorepo
            needs_python: true
            needs_rust: true
          - name: next-2x-fastapi-monorepo
            path: scaffolds/generated/next-2x-fastapi-monorepo
            needs_python: true
            needs_rust: false
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just lint
      - run: just typecheck

  test:
    name: ${{ matrix.fixture.name }} / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - name: next-monorepo
            path: scaffolds/generated/next-monorepo
            needs_python: false
            needs_rust: false
          - name: next-fastapi-monorepo
            path: scaffolds/generated/next-fastapi-monorepo
            needs_python: true
            needs_rust: false
          - name: next-axum-monorepo
            path: scaffolds/generated/next-axum-monorepo
            needs_python: false
            needs_rust: true
          - name: next-fastapi-axum-monorepo
            path: scaffolds/generated/next-fastapi-axum-monorepo
            needs_python: true
            needs_rust: true
          - name: next-2x-fastapi-monorepo
            path: scaffolds/generated/next-2x-fastapi-monorepo
            needs_python: true
            needs_rust: false
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just test

  ux:
    name: ${{ matrix.fixture.name }} / ux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - name: next-monorepo
            path: scaffolds/generated/next-monorepo
            needs_python: false
            needs_rust: false
          - name: next-fastapi-monorepo
            path: scaffolds/generated/next-fastapi-monorepo
            needs_python: true
            needs_rust: false
          - name: next-axum-monorepo
            path: scaffolds/generated/next-axum-monorepo
            needs_python: false
            needs_rust: true
          - name: next-fastapi-axum-monorepo
            path: scaffolds/generated/next-fastapi-axum-monorepo
            needs_python: true
            needs_rust: true
          - name: next-2x-fastapi-monorepo
            path: scaffolds/generated/next-2x-fastapi-monorepo
            needs_python: true
            needs_rust: false
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just ux

  supply-chain:
    name: ${{ matrix.fixture.name }} / supply-chain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - name: next-monorepo
            path: scaffolds/generated/next-monorepo
            needs_python: false
            needs_rust: false
          - name: next-fastapi-monorepo
            path: scaffolds/generated/next-fastapi-monorepo
            needs_python: true
            needs_rust: false
          - name: next-axum-monorepo
            path: scaffolds/generated/next-axum-monorepo
            needs_python: false
            needs_rust: true
          - name: next-fastapi-axum-monorepo
            path: scaffolds/generated/next-fastapi-axum-monorepo
            needs_python: true
            needs_rust: true
          - name: next-2x-fastapi-monorepo
            path: scaffolds/generated/next-2x-fastapi-monorepo
            needs_python: true
            needs_rust: false
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just supply-chain
