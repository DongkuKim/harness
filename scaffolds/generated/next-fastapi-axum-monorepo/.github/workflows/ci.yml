name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt,clippy,rust-src
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: astral-sh/setup-uv@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps
      - run: pnpm install
      - run: (cd apps/api && uv sync --group dev)
      - run: just lint
      - run: just typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: astral-sh/setup-uv@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: pnpm install
      - run: (cd apps/api && uv sync --group dev)
      - run: just test

  ux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: just ux

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: astral-sh/setup-uv@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: pnpm install
      - run: (cd apps/api && uv sync --group dev)
      - run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP"
          install "$RUNNER_TEMP/gitleaks" /usr/local/bin/gitleaks
      - run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 \
            -o "$RUNNER_TEMP/osv-scanner"
          install "$RUNNER_TEMP/osv-scanner" /usr/local/bin/osv-scanner
      - run: just supply-chain

