name: Scaffold Fixture CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/templates-ci.yml'
      - 'bin/**'
      - 'package.json'
      - 'scripts/**'
      - 'templates/modules/**'
      - 'scaffolds/presets/**'
      - 'scaffolds/generated/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/templates-ci.yml'
      - 'bin/**'
      - 'package.json'
      - 'scripts/**'
      - 'templates/modules/**'
      - 'scaffolds/presets/**'
      - 'scaffolds/generated/**'
  workflow_dispatch:

concurrency:
  group: scaffold-fixtures-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  scaffold-matrix:
    name: scaffold fixture matrix
    runs-on: ubuntu-latest
    outputs:
      fixtures: ${{ steps.scaffold-matrix.outputs.fixtures }}
      include_axum: ${{ steps.scaffold-matrix.outputs.include_axum }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: scaffold-matrix
        run: node ./scripts/scaffold-ci-matrix.mjs

  fast:
    name: ${{ matrix.fixture.name }} / fast
    needs: scaffold-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture: ${{ fromJSON(needs.scaffold-matrix.outputs.fixtures) }}
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just lint
      - run: just typecheck

  test:
    name: ${{ matrix.fixture.name }} / test
    needs: scaffold-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture: ${{ fromJSON(needs.scaffold-matrix.outputs.fixtures) }}
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just test

  ux:
    name: ${{ matrix.fixture.name }} / ux
    needs: scaffold-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture: ${{ fromJSON(needs.scaffold-matrix.outputs.fixtures) }}
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: just install
      - run: just ux

  supply-chain:
    name: ${{ matrix.fixture.name }} / supply-chain
    needs: scaffold-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture: ${{ fromJSON(needs.scaffold-matrix.outputs.fixtures) }}
    defaults:
      run:
        working-directory: ${{ matrix.fixture.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.fixture.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.fixture.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.fixture.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP"
          install "$RUNNER_TEMP/gitleaks" /usr/local/bin/gitleaks
      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 \
            -o "$RUNNER_TEMP/osv-scanner"
          install "$RUNNER_TEMP/osv-scanner" /usr/local/bin/osv-scanner
      - run: just install
      - run: just supply-chain
